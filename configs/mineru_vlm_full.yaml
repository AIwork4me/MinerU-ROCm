# Template config for OmniDocBench v1.6 scoring of the VLM (vlm-vllm) backend.
# The real prediction path is supplied at score time (mineru-rocm score
# --pred-dir ...), which writes the live config into a private temp dir; this
# file documents the metric layout only.
end2end_eval:
  metrics:
    text_block:
      metric:
      - Edit_dist
    display_formula:
      metric:
      - Edit_dist
      - CDM
      cdm_workers: 13
    table:
      metric:
      - TEDS
      - Edit_dist
      teds_workers: 13
    reading_order:
      metric:
      - Edit_dist
  dataset:
    dataset_name: end2end_dataset
    ground_truth:
      data_path: /workspace/OmniDocBench_data/OmniDocBench.json
    prediction:
      data_path: <your-pred-dir>
    match_method: quick_match
    match_workers: 13
    quick_match_truncated_timeout_sec: 300
    match_timeout_sec: 420
    timeout_fallback_max_chunk_span: 10
    timeout_fallback_order_penalty: 0.1
