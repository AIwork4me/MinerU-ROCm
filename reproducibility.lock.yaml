omnidocbench:
  version: v1.6
  scorer_repo_url: https://github.com/opendatalab/OmniDocBench
  scorer_commit: 2b161d010d2e3aff77a0edef359ea3a6411d23cd
  gt_json_full_sha256: a45cd84b04ad8b793e775089640e6b681209abea33ead54c1828ddca35fae496
