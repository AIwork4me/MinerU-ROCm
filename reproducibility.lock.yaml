  eval_config_sha256: a65a5b39df0e36a42ee940f9ef78cc71d793e7fb5885bc89004194515f3cc264
  canary_manifest_sha256: not_recorded
  metric:
    overall_formula: ((1 - text_EditDist) * 100 + formula_CDM * 100 + table_TEDS *
      100) / 3
    aggregation: page.ALL
    match_method: quick_match
    note: reading_order EditDist is reported separately and is NOT part of Overall
rocm_recipe:
  gpu_arch: gfx1100
  hsa_override:
    pipeline: none
    vlm_vllm: 11.0.0
  vlm_server:
    source_script: examples/serve_vlm_vllm.sh
    served_model_name: mineru-pro
    dtype: bfloat16
    tensor_parallel_size: 1
    max_model_len: 8192
    gpu_memory_utilization: 0.7
    limit_mm_per_prompt: '{"image": 1}'
    enforce_eager: true
    logits_processors: mineru_vl_utils:MinerULogitsProcessor
    vllm_use_v1: '1'
    port: 8265
  install: 'pip install -U "mineru[all]"         # + ROCm torch wheel; VLM additionally
    needs vLLM-on-ROCm

    '
  cli: 'mineru-rocm predict --backend {pipeline|vlm-vllm} --gt-json <gt> --images-dir
    <imgs> --pred-dir <out> --platform linux-rocm

    mineru-rocm score --gt-json <gt> --pred-dir <out> --label {pipeline|vlm-vllm} --omnidocbench-repo <OmniDocBench> --venv-python <scorer-venv>/bin/python

    '
