omnidocbench:
  version: v1.6
  scorer_repo_url: https://github.com/opendatalab/OmniDocBench
  scorer_commit: 2b161d010d2e3aff77a0edef359ea3a6411d23cd            # (verified) git rev-parse HEAD (OmniDocBench checkout)
  gt_json_full_sha256: a45cd84b04ad8b793e775089640e6b681209abea33ead54c1828ddca35fae496   # (verified) sha256sum OmniDocBench.json (1651 pages)
  gt_json_canary_sha256: not_recorded                                # (deferred → docs/known-gaps.md) populated when the canary subset lands (P3 canary step)
  eval_config_sha256: a65a5b39df0e36a42ee940f9ef78cc71d793e7fb5885bc89004194515f3cc264   # (verified) sha256sum src/mineru_rocm/data/eval_config.yaml
  canary_manifest_sha256: not_recorded                               # (deferred → docs/known-gaps.md) P3 canary step
  metric:
    overall_formula: "((1 - text_EditDist) * 100 + formula_CDM * 100 + table_TEDS * 100) / 3"   # (corrected P2/P3) matches scoring.overall_score; reading_order EditDist is separate, NOT in Overall
    aggregation: page.ALL                # OmniDocBench page_avg convention (NOT sample-weighted .all)
    match_method: quick_match
    note: "reading_order EditDist is reported separately and is NOT part of Overall"

rocm_recipe:                             # (verified) the canonical gfx1100/RDNA3 recipe (mirrors the upstream doc)
  gpu_arch: gfx1100                      # RDNA3 — Radeon PRO W7900 (only gfx1100 tested here; other RDNA3 variants e.g. gfx1101/1102 untested)
  hsa_override:
    pipeline: none                       # in-process PyTorch auto-detects gfx1100
    vlm_vllm: "11.0.0"                   # required by the tested vLLM-on-ROCm build (observed; gfx1100 only — not a MinerU source requirement)
  vlm_server:                            # (verified) key flags of the tested VLM server (canonical source: examples/serve_vlm_vllm.sh)
    source_script: examples/serve_vlm_vllm.sh   # the tracked, authoritative launch script — flags summarized here
    served_model_name: mineru-pro
    dtype: bfloat16
    tensor_parallel_size: 1              # no --tensor-parallel-size flag (vLLM default tp=1)
    max_model_len: 8192
    gpu_memory_utilization: 0.70
    limit_mm_per_prompt: '{"image": 1}'
    enforce_eager: true
    logits_processors: "mineru_vl_utils:MinerULogitsProcessor"
    vllm_use_v1: "1"                     # MANDATORY (v1 logits-processor API)
    port: 8265
  install: |
    pip install -U "mineru[all]"         # + ROCm torch wheel; VLM additionally needs vLLM-on-ROCm
  cli: |
    mineru-rocm predict --backend {pipeline|vlm-vllm} --gt-json <gt> --images-dir <imgs> --pred-dir <out> --platform linux-rocm
    mineru-rocm score --gt-json <gt> --pred-dir <out> --label {pipeline|vlm-vllm} --omnidocbench-repo <OmniDocBench> --venv-python <scorer-venv>/bin/python

environment:
  os:
    name: Linux
    kernel: "6.8.0-79-generic"           # (verified) results/**/metric_result.json uname (hostname redacted)
  gpu:
    vendor: AMD
    model: "Radeon PRO W7900"            # (verified) rocm-smi device id 0x744b
    arch: gfx1100                        # (verified) RDNA3
    vram_gb: 48                          # (verified) predict.log "GPU Memory: 48 GB"
    host_gpu_count: 4                    # (verified) host has 4× W7900
    gpu_count_per_benchmark: 1           # (verified) 1 GPU per worker (no tensor parallel)
  inference:
    dtype: bfloat16                      # (verified) examples/serve_vlm_vllm.sh --dtype bfloat16
    tensor_parallel_size: 1              # (verified) no --tensor-parallel-size flag (vLLM default tp=1)
    hip_visible_devices:                 # which physical GPU each run used (immaterial — any of the 4× is equivalent)
      vlm_vllm: "0"                      # (verified) examples/serve_vlm_vllm.sh HIP_VISIBLE_DEVICES default
      pipeline: not_recorded             # not captured in run_manifest env; original run docs recorded GPU 3
  hsa_override:                          # mirrored in rocm_recipe (the actionable recipe)
    pipeline: null                       # in-process PyTorch detected gfx1100 without it
    vlm_vllm: "11.0.0"                   # observed with the tested vLLM-on-ROCm build (gfx1100 only)
  # flat aliases kept for the check_repo gates (check_version_consistency reads gpu_arch + rocm_hip):
  gpu_arch: gfx1100                      # (verified) alias of gpu.arch — only gfx1100 tested
  rocm_smi_device_id: "Card Model 0x744b, SKU D7070910 (AMD Radeon Graphics)"   # (verified) rocm-smi --showproductname
  rocm_hip: "7.2"                        # (verified) torch.version.hip 7.2.53211 (both venvs)
  venvs:                                 # the two models ran in DIFFERENT venvs (different torch/vllm)
    pipeline:                            # mineru infer venv (Py3.11) — has mineru
      python: "3.11.15"
      torch: "2.14.0.dev20260717+rocm7.2"
      mineru: "3.4.4"
      mineru_vl_utils: "1.0.5"
      vllm: "0.19.1"                     # installed but UNUSED by the pipeline path
    vlm_vllm:                            # vLLM VLM venv (Py3.12) — has vllm 0.16.1 + mineru_vl_utils
      python: "3.12.3"
      torch: "2.9.1+gitff65f5b"
      vllm: "0.16.1.dev0+g89a77b108.d20260317"
      transformers: "4.57.6"
      huggingface_hub: "0.36.2"          # downgraded from 1.24.0 (>=1.0 broke transformers; Plan 2 range <1.0)
      mineru_vl_utils: "1.0.5"

