# reproducibility.lock.yaml — machine-readable reproducibility snapshot for the
# MinerU-ROCm results. Verified fields carry a source comment. Do not invent values.
#
# STATUS: P2/P3 fill (2026-07-19). Both full-1651 re-runs completed via the new
# `mineru-rocm predict | score` path; values below are recomputed from those runs.
# All anchors + upstream commits are now verified (see benchmark.official_reference
# and the mineru / mineru_vl_utils commit pins below). See
# docs/superpowers/specs/2026-07-19-mineru-rocm-standalone-port-design.md §3.3.
#
# Verification status legend:
#   # (verified)     = recomputed and recorded (2026-07-19)
#   # (not_recorded) = not derivable from this run; noted where known

mineru_rocm:
  repo: https://github.com/AIwork4me/MinerU-ROCm
  # Three DISTINCT commits — do not conflate (verified 2026-07-20 via git, not by comment):
  #   release.commit        = the commit the v0.1.0 tag resolves to (install this for stable code).
  #   release.tag_object_sha = the ANNOTATED TAG object SHA (cat-file -t = tag); NOT a commit.
  #   benchmark_run_commits.* = the exact repo commit each published run executed at
  #     (matches each run_manifest.json `repo_commit`). The two runs used DIFFERENT commits;
  #     both are ancestors of the release commit. The release tag is NOT the run commit.
  release:
    tag: v0.1.0
    commit: 839776e1774a1d85be8f9314a830e612d44a6926          # (verified) git rev-parse 'v0.1.0^{commit}' — "Merge pull request #7 from AIwork4me/feat/p2p3-results"
    tag_object_sha: dd591469d009cac246f5090daa7398623d2fd878  # (verified) git rev-parse v0.1.0 — ANNOTATED TAG object (NOT a commit); git cat-file -t v0.1.0 = tag
  benchmark_run_commits:
    pipeline: e05eec322dd8bf45447c3dec53349454f0424e61        # (verified) results/omnidocbench/v1.6/pipeline/run_manifest.json repo_commit
    vlm_vllm: b75f788419d35a4210c201159a6c67923d60d65c        # (verified) results/omnidocbench/v1.6/vlm-vllm/run_manifest.json repo_commit

