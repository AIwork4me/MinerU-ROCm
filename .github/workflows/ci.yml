on: [push, pull_request]
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      # [dev] = pytest/ruff/reuse; [platform] = omnidocbench-amd (the adapter still
      # imports omnidocbench_amd.types until P1 lands a local types.py). The redundant
      # explicit installs are no longer needed once both extras are pulled.
      - run: pip install -e ".[dev,platform]"
      - run: python -c "from omnidocbench_amd.types import RunSummary"
      - run: pytest -q
      - name: Conformance check (contract)
        run: |
          python -c "from omnidocbench_amd.conformance import check_repo; from pathlib import Path; import sys; r = check_repo(Path('.')); print('CONFORMANT' if r.ok else 'NON-CONFORMANT: ' + ', '.join(r.failures)); sys.exit(0 if r.ok else 1)"
