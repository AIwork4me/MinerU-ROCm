name: CI

on: [push, pull_request]

jobs:
  # Core (GPU-free): the package + docs + gates that do not need the engine.
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags: check_repo validates git tag/commit provenance
          # (e.g. test_release_and_run_provenance_flags_mismatched_lock needs the
          # v0.1.0 annotated tag), which a shallow clone lacks.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - run: ruff check .
      - run: python scripts/check_repo.py
      - run: reuse lint
      - run: python -m build
      - run: python -m pip check

  # Platform contract: install the OmniDocBench-ROCm engine, run conformance +
  # the committed-artifact bundle validator. Pinned to the merged platform main
  # commit (0.3.1, PR #15) — no floating main. Switch to
  # `"omnidocbench-rocm>=0.3.1,<0.4"` once 0.3.1 ships to PyPI.
  platform-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: Install pinned OmniDocBench-ROCm engine (0.3.1, main ce081db)
        run: pip install "git+https://github.com/AIwork4me/OmniDocBench-ROCm.git@ce081dbd3848d84cb0622ceee57c8f054845fcf3#egg=omnidocbench-rocm"
      - run: pip install -e ".[dev]"
      - run: omnidocbench-rocm conformance .
      - run: python scripts/validate_platform_artifacts.py
