name: CI

on: [push, pull_request]

jobs:
  # Core (GPU-free): package, documentation, and repository gates.
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history and tags are required by the release-provenance gate.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - run: ruff check .
      - run: python scripts/check_repo.py
      - run: reuse lint
      - run: python -m build
      - run: python -m pip check

  # Platform contract: use an immutable published wheel, not a floating branch.
  platform-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: Install pinned OmniDocBench-ROCm engine (0.3.2)
        run: pip install "https://github.com/AIwork4me/OmniDocBench-ROCm/releases/download/v0.3.2/omnidocbench_rocm-0.3.2-py3-none-any.whl#sha256=a6e1d97dfe3d75c54bf148f178ab5a42c48760516c1ea81d687bc3fb730a02ad"
      - run: pip install -e ".[dev]"
      - run: omnidocbench-rocm conformance .
      - run: python scripts/validate_platform_artifacts.py
