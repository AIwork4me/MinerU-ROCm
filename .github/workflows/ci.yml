on: [push, pull_request]
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      # The core is GPU-free (local types.py, no engine import coupling), so CI
      # installs [dev] only. [platform] (omnidocbench-rocm) is OPTIONAL; the
      # conformance gate runs in the local / platform env, not in CI.
      - run: pip install -e ".[dev]"
      - run: python scripts/check_repo.py
      - run: python -c "from mineru_rocm.types import RunSummary, PageStatus; print('mineru_rocm.types ok')"
      - run: pytest -q
